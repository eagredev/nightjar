; Nightjar configuration template. Copy to ~/.config/nightjar/nightjar.conf
; and chmod 600. Real values redacted; replace before use.
;
; The example below is the v0.1 (watcher-only) shape. Sections that aren't
; read until later build steps (security, smtp, capability tools, etc.) are
; not present here. See DESIGN.md "Config file shape" for the full v1 layout.

[daemon]
state_dir          = ~/.local/share/nightjar
log_dir            = ~/nightjar/logs

[contact:principal]
addresses          = principal@example.com
display_name       = Principal
relationship       = Administrator (principal)
daily_limit        = unlimited
is_principal       = true

[contact:composer]
addresses          = composer@example.com
display_name       = Composer
relationship       = Composer for the project
daily_limit        = 3

[inbox:nightjar]
enabled            = true
imap_host          = imap.gmail.com
imap_port          = 993
imap_user          = eagre.nightjar@gmail.com
imap_password      = <gmail-app-password>
allowed_contacts   = principal, composer

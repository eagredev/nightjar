; Nightjar configuration template. Copy to ~/.config/nightjar/nightjar.conf
; and chmod 600. Replace placeholder values before use.
;
; This file covers the v0.4 surface (everything shipped through Step 7
; wave 3a). Sections marked OPTIONAL can be omitted; their defaults are
; documented inline. See DESIGN.md for the full v1 design and
; daemon/config.py for the authoritative parser.
;
; Three things live OUTSIDE this file:
;
;   1. Secrets (SMTP password, IMAP password, HOTP/TOTP secret, Anthropic
;      API key) live in ~/.config/nightjar/secrets.toml, machine-id-bound
;      and chmod 600. The migrator moves them out automatically on first
;      start if they were ever pasted into nightjar.conf — once moved,
;      the daemon refuses to start if they reappear here. See
;      "Secrets at rest" in README.md for what the obfuscation does
;      and does not defend against.
;
;   2. Contacts live one-per-file at ~/.config/nightjar/contacts/<id>.toml.
;      Legacy [contact:*] blocks in nightjar.conf are rejected; the
;      contacts_migrator runs them out automatically on first start.
;      See the contact TOML template at the bottom of this file.
;
;   3. Rapport notes (Step 7) live one-per-contact at
;      ~/nightjar/contacts/<id>.md. The daemon writes them autonomously
;      from triage; the operator can edit them by hand any time.

[daemon]
state_dir          = ~/.local/share/nightjar
log_dir            = ~/nightjar/logs
; Rapport notes per contact live here. The 'forget <contact>' tier-2
; verb deletes <contact>.md from this directory.
notes_dir          = ~/nightjar/contacts
; Per-file contact TOMLs live here. Default is ~/.config/nightjar/contacts.
contacts_dir       = ~/.config/nightjar/contacts

[security]
; Generate the shared secret with: nightjar --setup-auth
; The same base32 secret is used whether auth_mode is hotp or totp.
; Provision it into a FOSS authenticator app (Aegis, 2FAS, FreeOTP).
; The actual secret value lives in secrets.toml under
; [security].totp_secret; this section just declares it exists. The
; daemon refuses to start without a configured secret.
auth_mode                            = hotp
; auth_mode = hotp  (RFC 4226 counter-based; recommended for email
;                    because email's async delivery latency would
;                    routinely outlive a TOTP code)
;             totp  (RFC 6238 time-based; codes auto-expire ~90s)
;
; The dead-man's-switch trips when this many auth failures from the
; principal address land within the sliding window.
dead_mans_switch_window_minutes      = 60
dead_mans_switch_threshold           = 3

[smtp]
; Outbound credentials. The same Gmail app password works for both
; IMAP and SMTP. STARTTLS is implicit at port 587. The actual
; password lives in secrets.toml under [smtp].password.
host                                 = smtp.gmail.com
port                                 = 587
user                                 = eagre.nightjar@gmail.com
from_name                            = Nightjar
from_addr                            = eagre.nightjar@gmail.com

; OPTIONAL — required to use Step 5+ (any LLM hop). Without this
; section, the daemon runs in pre-Step-5 mode (deterministic verbs only,
; no contact triage). The actual API key lives in secrets.toml under
; [claude].api_key.
[claude]
; Default model for triage and the principal-interpret pass. Haiku 4.5
; is the floor: cheap enough that the £20/month console cap leaves
; comfortable headroom (~thousands of triage calls).
default_model                        = claude-haiku-4-5
; Pass-1 scope classifier (Step 7b). Defaults to Haiku regardless of
; default_model because scope classification is a small structured
; task. Bump to a stronger model only if classification accuracy on
; real contacts proves a problem.
scope_classifier_model               = claude-haiku-4-5
; In-daemon rate cap. The first line of defence is the £20/month spend
; cap on the Anthropic console; this is the second line, so a runaway
; state inside the daemon cannot burn an entire month's budget in one
; hour. 30/hr matches DESIGN.md's worst-case cost model (~$0.60/hr).
per_hour_max_invocations             = 30
; Defensive prompt-size cap. A pathological email body should not be
; allowed to spend a whole hour's budget in one call. 8000 covers a
; normal email plus the system prompt and recent thread context.
per_invocation_max_input_tokens      = 8000
; Soft cost ceiling for ONE principal-interpret call. When a call
; exceeds this (computed from actual token usage and the model's
; published rates), the result still surfaces but the overage is
; flagged. 10 = $0.10. Configurable to suit operators with higher or
; lower tolerance.
principal_per_message_cost_cents     = 10
; Hard kill threshold. If a call costs more than
; principal_per_message_cost_cents * principal_hard_kill_multiplier,
; the daemon refuses to surface the LLM output at all and emails the
; principal a brief 'killed for cost' notice. Defends against
; pathological loops where the LLM somehow generates very large output.
principal_hard_kill_multiplier       = 5
; Experimental UX knob. When true, even side-effect queries get an
; inline prose answer that suggests the deterministic verb to issue
; manually, instead of a structured plan that lands in the approval
; queue. Off by default.
principal_always_direct              = false

; OPTIONAL — Step 7b topical scope registry. Empty (or absent) means
; "no scopes defined"; every contact must then have empty scopes = [].
; Each scope is `name = one-line description`. The description is fed
; into the triage prompt so the LLM has a concrete anchor for what each
; tag means. Names: lowercase ASCII, kebab/snake, must start with a
; letter.
[scopes]
nightjar-dev = the Nightjar codebase, design, and build sequence
aurora       = the Aurora redesign work — timelines, deliverables, blockers
music-tech   = music production, mixing, GBA chiptune workflows

[inbox:nightjar]
enabled            = true
imap_host          = imap.gmail.com
imap_port          = 993
imap_user          = eagre.nightjar@gmail.com
; The IMAP password lives in secrets.toml under [imap.nightjar].password.
; If you put it here too, the daemon refuses to start (misconfigured
; state from before migration).
;
; trusted_authserv: REQUIRED. The authserv-id your provider stamps in
; Authentication-Results: headers. Gmail uses 'mx.google.com'. The
; daemon refuses to process contact mail without this because it
; cannot otherwise tell real DMARC verdicts from attacker-injected
; ones (an attacker can write any A-R: header they like into a forged
; message; only the headers stamped BY the trusted authserv count).
trusted_authserv   = mx.google.com
; Catch-up window for SINCE-bounded IMAP search. Default 7 days. The
; first run (no watermark in state.db) ignores this and does a 30-day
; sweep + one-shot reconciliation summary to the principal. Subsequent
; runs use this value, plus a 1-day overlap to absorb clock skew or
; mid-flight crashes. Must be >= 1.
catchup_window_days = 7
; How many recent messages the out-of-band IMAP walk in `status walk=N`
; pulls when surfacing mail the daemon may have missed. Must be >= 10.
status_walk_count  = 200

; ----------------------------------------------------------------------
; Per-contact TOML template — write one of these per correspondent at
; ~/.config/nightjar/contacts/<contact_id>.toml, chmod 600. The filename
; stem must match the contact_id field exactly.
;
; Example: ~/.config/nightjar/contacts/principal.toml
;
;     contact_id   = "principal"
;     addresses    = ["principal@example.com"]
;     display_name = "Principal"
;     relationship = "Operator (principal)"
;     daily_limit  = "unlimited"     # int >= 0 or the string "unlimited"
;     is_principal = true            # exactly one contact must be true
;     inboxes      = ["nightjar"]    # which inboxes accept this contact
;     scopes       = []              # default empty (= unrestricted)
;
; Example: ~/.config/nightjar/contacts/composer.toml
;
;     contact_id   = "composer"
;     addresses    = ["composer@example.com"]
;     display_name = "Composer"
;     relationship = "Composer collaborator on the Aurora project"
;     daily_limit  = 3
;     is_principal = false
;     inboxes      = ["nightjar"]
;     scopes       = ["aurora", "music-tech"]
;
; Notes:
;   - The per-inbox allowlist is derived from each contact's inboxes
;     list. There is no longer an `allowed_contacts =` line on
;     [inbox:*] (it is rejected if present).
;   - Every scope referenced here must exist in this file's [scopes]
;     registry, or the daemon refuses to start.
;   - The 'add' tier-2 verb writes new contact files automatically.
;     The 'remove' verb deletes them. You rarely need to hand-edit.

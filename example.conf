; Nightjar configuration template. Copy to ~/.config/nightjar/nightjar.conf
; and chmod 600. Real values redacted; replace before use.
;
; The example below covers v0.2 (watcher + auth). Sections that aren't read
; until later build steps (smtp, capability tools, etc.) are not present
; here. See DESIGN.md "Config file shape" for the full v1 layout.

[daemon]
state_dir          = ~/.local/share/nightjar
log_dir            = ~/nightjar/logs

[security]
; Generate with: nightjar --setup-auth
; Provision the same secret into a FOSS authenticator app (Aegis, 2FAS,
; FreeOTP). NEVER commit a real secret. The daemon refuses to start
; without this.
totp_secret                          = <base32-secret>
; auth_mode = hotp  (counter-based, default — recommended for email)
;             totp  (time-based, codes auto-expire after ~90s)
auth_mode                            = hotp
; The dead-man's-switch trips when this many auth failures from the
; principal address land within the sliding window.
dead_mans_switch_window_minutes      = 60
dead_mans_switch_threshold           = 3

[contact:principal]
addresses          = principal@example.com
display_name       = Principal
relationship       = Administrator (principal)
daily_limit        = unlimited
is_principal       = true

[contact:composer]
addresses          = composer@example.com
display_name       = Composer
relationship       = Composer for the project
daily_limit        = 3

[inbox:nightjar]
enabled            = true
imap_host          = imap.gmail.com
imap_port          = 993
imap_user          = eagre.nightjar@gmail.com
imap_password      = <gmail-app-password>
allowed_contacts   = principal, composer
